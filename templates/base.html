<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BaseStation{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">BaseStation</span>
      <nav>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
        <a href="/config" {% if request.path == '/config' %}class="active"{% endif %}>Config</a>
        <a href="/position" {% if request.path == '/position' %}class="active"{% endif %} id="nav-position">Position</a>
        <a href="/network" {% if request.path == '/network' %}class="active"{% endif %}>Network</a>
        <a href="/rtcm" {% if request.path == '/rtcm' %}class="active"{% endif %}>RTCM</a>
        <a href="/logs" {% if request.path == '/logs' %}class="active"{% endif %}>Logs</a>
        <a href="/swagger" {% if request.path == '/swagger' %}class="active"{% endif %}>API</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <small>BaseStation RTK Base Station &mdash; <span id="uptime-display"></span></small>
  </footer>

  <script>
    // Update uptime display + nav state indicators
    function updateUptime() {
      fetch('/api/state')
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('uptime-display');
          if (el && data.system_uptime_s) {
            const s = data.system_uptime_s;
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            el.textContent = `Uptime: ${h}h ${m}m`;
          }
          // Dim Position nav link when GPS HAT not detected or NTRIP relay active
          const posLink = document.getElementById('nav-position');
          if (posLink) {
            const serialOk = data.gps ? data.gps.serial_ok !== false : true;
            const isNtrip = data.correction_source === 'ntrip';
            if (!serialOk) {
              posLink.style.opacity = '0.45';
              posLink.title = 'GPS HAT not detected — stored position may still be available';
            } else if (isNtrip) {
              posLink.style.opacity = '0.45';
              posLink.title = 'NTRIP relay mode — position management not applicable';
            } else {
              posLink.style.opacity = '';
              posLink.title = '';
            }
          }
        })
        .catch(() => {});
    }
    setInterval(updateUptime, 30000);
    updateUptime();
  </script>

  {% block extra_scripts %}{% endblock %}
</body>
</html>
